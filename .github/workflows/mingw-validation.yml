name: MinGW validation

# Reproduces the same MinGW/Windows validation path documented in README.md
# and docs/refactor-plan.md, so every PR gets an independent build/test
# signal before merge (see docs/refactor-log.md's Phase 6 entry -- Phase 5's
# PR merged with no CI run at all).
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  mingw-build-and-test:
    runs-on: windows-latest
    env:
      # GitHub-hosted Windows runners have no audio device, so Mix_OpenAudio()
      # fails via WASAPI ("can't find requested audio endpoint") against the
      # real default driver -- SDL's "dummy" driver discards audio output
      # instead of requiring real hardware, which is exactly what a
      # non-interactive CI build needs. Not a code change: app_init() already
      # handles Mix_OpenAudio failure correctly (reports it, shuts down
      # cleanly) -- this fixes the CI environment, not the application.
      SDL_AUDIODRIVER: dummy
    steps:
      - uses: actions/checkout@v4

      # MINGW64, not UCRT64: the official SDL2 "mingw" devel packages are
      # built against the legacy MSVCRT runtime, matching MINGW64's runtime
      # -- not UCRT64's UCRT. (Both environments report the same
      # x86_64-w64-mingw32 triple via `gcc -dumpmachine`, so the triple alone
      # is not what decides this -- don't "simplify" to UCRT64 on that basis.)
      - name: Set up MSYS2 MINGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            make

      # Runs in the runner's own preinstalled Git Bash (curl/tar already
      # present), independent of and before the MSYS2 environment is needed
      # -- only the later build/test steps need MSYS2's gcc/make on PATH.
      - name: Fetch SDL2 MinGW dependencies
        shell: bash
        run: ./scripts/setup-mingw-sdl2.sh

      # Dependency-light, stdlib-only Python script -- runs with the
      # runner's own pre-installed Python, no MSYS2 needed. See
      # scripts/audit_repository_usage.py and
      # docs/unused-code-assets-audit.md.
      - name: Repository usage integrity check
        shell: bash
        run: |
          python scripts/test_audit_repository_usage.py
          python scripts/audit_repository_usage.py

      # Every step from here on must use `shell: msys2 {0}` -- gcc/make are
      # only on PATH inside the MSYS2-provided shell, matching the
      # Makefile's bare `CC_MINGW := gcc`. A step written as `shell: bash`
      # here would silently fall back to the runner's own Git Bash, where
      # neither gcc nor make exist.
      - name: Clean
        shell: msys2 {0}
        run: make mingw-clean

      - name: Build
        shell: msys2 {0}
        run: make mingw 2>&1 | tee build.log

      - name: Report warning count
        shell: msys2 {0}
        run: |
          count=$(grep -c "warning:" build.log || true)
          if [ "$count" -ne 0 ]; then
            echo "Unexpected compiler warnings: $count"
            exit 1
          fi
          echo "Warning count: 0 (-Werror enforced)"

      - name: Smoke test
        shell: msys2 {0}
        run: make mingw-smoketest 2>&1 | tee smoketest.log

      - name: Scene test
        shell: msys2 {0}
        run: make mingw-scenetest 2>&1 | tee scenetest.log

      - name: Lifecycle test
        shell: msys2 {0}
        run: make mingw-lifecycletest 2>&1 | tee lifecycletest.log

      - name: Frame pipeline test
        shell: msys2 {0}
        run: make mingw-frametest 2>&1 | tee frametest.log

      - name: Runner death test
        shell: msys2 {0}
        run: make mingw-deathtest 2>&1 | tee deathtest.log

      - name: Entity spawn factory test
        shell: msys2 {0}
        run: make mingw-entityspawntest 2>&1 | tee entityspawntest.log

      - name: Command translation test
        shell: msys2 {0}
        run: make mingw-commandtest 2>&1 | tee commandtest.log

      - name: Header self-containment test
        shell: msys2 {0}
        run: make mingw-headertest 2>&1 | tee headertest.log

      - name: GameState grouping test
        shell: msys2 {0}
        run: make mingw-groupingtest 2>&1 | tee groupingtest.log

      - name: Fixed-timestep physics test
        shell: msys2 {0}
        run: make mingw-physicstest 2>&1 | tee physicstest.log

      - name: Input state test
        shell: msys2 {0}
        run: make mingw-inputtest 2>&1 | tee inputtest.log

      - name: Collision correctness test
        shell: msys2 {0}
        run: make mingw-collisiontest 2>&1 | tee collisiontest.log

      - name: Projectile correctness test
        shell: msys2 {0}
        run: make mingw-projectiletest 2>&1 | tee projectiletest.log

      - name: Game feel test
        shell: msys2 {0}
        run: make mingw-gamefeeltest 2>&1 | tee gamefeeltest.log

      - name: Input snapshot test
        shell: msys2 {0}
        run: make mingw-inputsnapshottest 2>&1 | tee inputsnapshottest.log

      - name: AI forces test
        shell: msys2 {0}
        run: make mingw-aiforcestest 2>&1 | tee aiforcestest.log

      - name: Collision ordering test
        shell: msys2 {0}
        run: make mingw-collisionorderingtest 2>&1 | tee collisionorderingtest.log

      - name: Render interpolation test
        shell: msys2 {0}
        run: make mingw-interpolationtest 2>&1 | tee interpolationtest.log

      - name: Physics units test
        shell: msys2 {0}
        run: make mingw-physicsunitstest 2>&1 | tee physicsunitstest.log

      - name: Physics body and collider test
        shell: msys2 {0}
        run: make mingw-physicsbodytest 2>&1 | tee physicsbodytest.log

      - name: Common world-collision solver test
        shell: msys2 {0}
        run: make mingw-worldcollisiontest 2>&1 | tee worldcollisiontest.log

      - name: Display settings test
        shell: msys2 {0}
        run: make mingw-displaytest 2>&1 | tee displaytest.log

      - name: Settings and input defaults test
        shell: msys2 {0}
        run: make mingw-settingstest 2>&1 | tee settingstest.log

      - name: Deterministic replay test
        shell: msys2 {0}
        run: make mingw-replaytest 2>&1 | tee replaytest.log

      - name: Data-driven Arcade waves test
        shell: msys2 {0}
        run: make mingw-wavetest 2>&1 | tee wavetest.log

      - name: Data-driven Runner segments test
        shell: msys2 {0}
        run: make mingw-segmenttest 2>&1 | tee segmenttest.log

      - name: Combat feedback and animation test
        shell: msys2 {0}
        run: make mingw-feedbacktest 2>&1 | tee feedbacktest.log

      - name: Pre-Phase-35 state and input audit
        shell: msys2 {0}
        run: make mingw-prephase35-statetest 2>&1 | tee prephase35-statetest.log

      - name: Pre-Phase-35 simulation audit
        shell: msys2 {0}
        run: make mingw-prephase35-simulationtest 2>&1 | tee prephase35-simulationtest.log

      - name: Pre-Phase-35 lifecycle audit
        shell: msys2 {0}
        run: make mingw-prephase35-lifecycletest 2>&1 | tee prephase35-lifecycletest.log

      - name: Pre-Phase-35 integration audit
        shell: msys2 {0}
        run: make mingw-prephase35-integrationtest 2>&1 | tee prephase35-integrationtest.log

      - name: Pre-Phase-35 persistence audit
        shell: msys2 {0}
        run: make mingw-prephase35-persistencetest 2>&1 | tee prephase35-persistencetest.log

      - name: Pre-Phase-35 UI and leaderboard audit
        shell: msys2 {0}
        run: make mingw-prephase35-uitest 2>&1 | tee prephase35-uitest.log

      - name: Pre-Phase-35 robustness and long-session audit
        shell: msys2 {0}
        run: make mingw-prephase35-robustnesstest 2>&1 | tee prephase35-robustnesstest.log

      - name: Pre-Phase-35 collision and AI audit
        shell: msys2 {0}
        run: make mingw-prephase35-collisionaitest 2>&1 | tee prephase35-collisionaitest.log

      - name: Pre-Phase-35 deterministic restart and soak audit
        shell: msys2 {0}
        run: make mingw-prephase35-soaktest 2>&1 | tee prephase35-soaktest.log

      - name: Build runnable Windows package
        shell: msys2 {0}
        run: make mingw-package MINGW_PACKAGE_DIR="$RUNNER_TEMP/endgame-windows" 2>&1 | tee package.log

      - name: Verify runnable Windows package
        shell: msys2 {0}
        run: make mingw-package-verify MINGW_PACKAGE_DIR="$RUNNER_TEMP/endgame-windows" 2>&1 | tee package-verify.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mingw-validation-logs
          path: |
            build.log
            smoketest.log
            scenetest.log
            lifecycletest.log
            frametest.log
            deathtest.log
            entityspawntest.log
            commandtest.log
            headertest.log
            groupingtest.log
            physicstest.log
            inputtest.log
            collisiontest.log
            projectiletest.log
            gamefeeltest.log
            inputsnapshottest.log
            aiforcestest.log
            collisionorderingtest.log
            interpolationtest.log
            physicsunitstest.log
            physicsbodytest.log
            worldcollisiontest.log
            displaytest.log
            settingstest.log
            replaytest.log
            wavetest.log
            segmenttest.log
            feedbacktest.log
            prephase35-statetest.log
            prephase35-simulationtest.log
            prephase35-lifecycletest.log
            prephase35-integrationtest.log
            prephase35-persistencetest.log
            prephase35-uitest.log
            prephase35-robustnesstest.log
            prephase35-collisionaitest.log
            prephase35-soaktest.log
            package.log
            package-verify.log
          if-no-files-found: ignore

  # Windows CI, however thorough, cannot prove case-sensitive path
  # correctness -- Windows' filesystem accepts a wrong-case request
  # silently. Linux ships a real case-sensitive filesystem, so this job is
  # the actual proof that docs/asset-path-portability.md's corrected
  # literals are right, not just statically plausible. See
  # docs/asset-path-portability.md and docs/unused-code-assets-audit.md.
  linux-asset-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # This step is the mandatory deliverable for this job and must pass:
      # a real case-sensitive filesystem check of every asset-path literal.
      - name: Repository usage integrity check (case-sensitive filesystem)
        run: |
          python3 scripts/test_audit_repository_usage.py
          python3 scripts/audit_repository_usage.py

      # The production build and real loader smoke test are required gates,
      # not advisory probes. Software-renderer and silent-audio fallbacks keep
      # this meaningful on a headless hosted runner.
      # The compat-include shim mirrors the same SDL2_image/SDL2_ttf/
      # SDL2_mixer header-layout fix already proven necessary for the
      # Windows/MinGW build (scripts/setup-mingw-sdl2.sh's compat-include),
      # since most Linux distribution SDL2 packages are expected to ship the
      # same flat SDL2/ header layout that required it there.
      - name: Install SDL2 dev packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev libsdl2-mixer-dev

      - name: Create compat-include shims
        run: |
          mkdir -p /tmp/linux-compat-include/SDL2_image
          mkdir -p /tmp/linux-compat-include/SDL2_ttf
          mkdir -p /tmp/linux-compat-include/SDL2_mixer
          printf '#pragma once\n#include <SDL2/SDL_image.h>\n' > /tmp/linux-compat-include/SDL2_image/SDL_image.h
          printf '#pragma once\n#include <SDL2/SDL_ttf.h>\n' > /tmp/linux-compat-include/SDL2_ttf/SDL_ttf.h
          printf '#pragma once\n#include <SDL2/SDL_mixer.h>\n' > /tmp/linux-compat-include/SDL2_mixer/SDL_mixer.h

      - name: Build production executable
        run: make linux LINUX_COMPAT_INCLUDE=/tmp/linux-compat-include 2>&1 | tee linux-build.log

      - name: Smoke test
        env:
          # GitHub-hosted Linux runners have neither an audio device nor a
          # display server -- SDL's "dummy" audio/video drivers make
          # app_init()'s SDL_CreateWindow/Mix_OpenAudio calls succeed in a
          # fully headless container instead of requiring real hardware.
          # Not a code change, mirrors the Windows job's own
          # SDL_AUDIODRIVER=dummy fix above.
          SDL_AUDIODRIVER: dummy
          SDL_VIDEODRIVER: dummy
        run: make linux-smoketest LINUX_COMPAT_INCLUDE=/tmp/linux-compat-include 2>&1 | tee linux-smoketest.log

      - name: Upload Linux production logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-production-validation-logs
          path: |
            linux-build.log
            linux-smoketest.log
          if-no-files-found: ignore

  # Native Linux has sanitizer runtimes that the validated MinGW toolchains do
  # not ship. Replay and the headless pre-Phase-35 simulation, integration,
  # and robustness audits provide an actionable memory/UB signal for every PR.
  linux-sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2 development packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev libsdl2-mixer-dev

      - name: Create compat-include shims
        run: |
          mkdir -p /tmp/linux-compat-include/SDL2_image
          mkdir -p /tmp/linux-compat-include/SDL2_ttf
          mkdir -p /tmp/linux-compat-include/SDL2_mixer
          printf '#pragma once\n#include <SDL2/SDL_image.h>\n' > /tmp/linux-compat-include/SDL2_image/SDL_image.h
          printf '#pragma once\n#include <SDL2/SDL_ttf.h>\n' > /tmp/linux-compat-include/SDL2_ttf/SDL_ttf.h
          printf '#pragma once\n#include <SDL2/SDL_mixer.h>\n' > /tmp/linux-compat-include/SDL2_mixer/SDL_mixer.h

      - name: Headless audit tests under AddressSanitizer and UndefinedBehaviorSanitizer
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: make linux-asan LINUX_COMPAT_INCLUDE=/tmp/linux-compat-include 2>&1 | tee linux-asan.log

      - name: Upload sanitizer log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-sanitizer-log
          path: linux-asan.log
          if-no-files-found: ignore
